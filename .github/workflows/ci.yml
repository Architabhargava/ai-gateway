name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.24"
  APP_NAME: ai-gateway

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run go vet
        run: go vet ./...
      - name: Run tests
        run: go test -v -count=1 -timeout=60s ./...
      - name: Run tests with race detector
        run: go test -race -count=1 -timeout=60s ./...

  # ── Job 2: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${GITHUB_SHA::8}" \
            -o bin/${{ env.APP_NAME }} \
            ./cmd/main.go
          echo "Binary size: $(du -sh bin/${{ env.APP_NAME }} | cut -f1)"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-binary
          path: bin/
          retention-days: 7

  # ── Job 3: Docker + Trivy ────────────────────────────────────────────────
  docker:
    name: Docker + Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ env.APP_NAME }}:latest .
      - name: Run Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_NAME }}:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          output: trivy-report.txt
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30
      - name: Print Trivy report
        if: always()
        run: cat trivy-report.txt

  # ── Job 4: Lint (non-blocking — never fails the pipeline) ────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --config=.golangci.yml
        continue-on-error: true