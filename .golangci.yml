run:
  timeout: 5m
  go: "1.24"

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - misspell

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - staticcheck
    - path: "groq_test_helpers\\.go"
      linters:
        - staticcheck
        - unused

  max-issues-per-linter: 50
  max-same-issues: 10